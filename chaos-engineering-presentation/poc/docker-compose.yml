version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: poc_redis
    ports:
      - "6379:6379"

  gateway:
    build: ./gateway_api
    container_name: poc_gateway
    volumes:
      - ./gateway_api:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=poc_redis
      - SUGGESTIONS_URL=http://poc_suggestions:8001
    depends_on:
      - redis
      - suggestions
    cap_add:
      - NET_ADMIN

  suggestions:
    build: ./suggestions
    container_name: poc_suggestions
    volumes:
      - ./suggestions:/app
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '0.5'
    cap_add:
      - NET_ADMIN

  frontend:
    image: nginx:alpine
    container_name: poc_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
