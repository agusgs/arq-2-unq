version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: weather_flow_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_DATABASE=weather_flow_dev
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
